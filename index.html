<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Nuevo Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f3e9e4;
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    min-height: 100vh;
    
}

.card {
    position: relative;
    width: 700px;
    background: #f3e9e4;
    padding: 60px 40px;
    text-align: center;
    z-index: 2;
}
/* Marco decorativo */
.border {
    position: absolute;
    inset: 10px;
    border: 4px solid #c2187a;
    border-radius: 40px;
}

.stars-container {
  position: fixed;
  inset: 0; 
  pointer-events: none;
  overflow: hidden;
  z-index: 9999;
}

.star {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #c2187a;
      border-radius: 50%;
      opacity: 0;
      animation: shoot 2s ease-out forwards;
    }

@keyframes shoot {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(0.5);
        opacity: 0;
      }
    }
/* Títulos */
.title-small {
    font-family: 'Great Vibes', cursive;
    font-size: 32px;
    color: #c2187a;
}

.title-big {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: #c2187a;
    margin: 10px 0;
}

.subtitle {
    color: #c2187a;
    margin: 20px 0;
}

/* Fecha */
.date-container {
  display: flex;
  justify-content: center; 
  align-items: center;
  gap: 50px; 
  margin: 30px 0;
  color: #c2187a;
}

.date-center .day {
    font-size: 48px;
    font-weight: bold;
}

/* Dirección */
.address {
    margin-top: 20px;
    margin-bottom: 30px;
    color: #c2187a;
}

/* QR */
.qr {
  display: inline-block;
  padding: 2px;
  background: transparent;
  margin-bottom: 30px;
}

.qr img {
  width: 140px;
  display: block;
  margin: 0 auto;
  mix-blend-mode: multiply;
}

/* SVG decoraciones */
.decor {
  position: absolute;
  z-index: -1;
}

.decor.full {
  width: 100%;
}

.decor.half {
  max-width: 50%;
}

.flower img {
  max-width:70%;
}

.bow img {
    width: 100%;
    max-width: 60%;
}

.cup img {
    width: auto;
    height: 420px;
}

.top-center {
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.top-left {
  top: 2%;
  left: -8%;
}

.top-right {
  top: 2%;
  right: -8%;
}


.bottom-left {
  bottom: 15px;
  left: 15px;
}

.bottom-right {
  bottom: 15px;
  right: 15px;
}

.bottom-center {
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%) scaleX(-1);
}

.glass {
    position: absolute;
    bottom: 20px;
    right: 40px;
    width: 60px;
}

@media(max-width:700px){
    .card{
        width: 90%;
    }
    .title-big{
        font-size: 50px;
    }
    .cup img {
        height: 350px;
    }
}
</style>
</head>

<body>



<div class="card">

    <div class="stars-container"></div>

    <div class="border"></div>

    <div class="decor half top-left bow">
        <img src="svgs/Monoleft.svg">
    </div>
 
    <div class="decor half top-right bow">
        <img src="svgs/Monorigth.svg">
    </div>

    <div class="decor bottom-left cup">
        <img src="svgs/Copa.svg">
    </div>

    <div class="decor bottom-right cup">
        <img src="svgs/Copa.svg">
    </div>

    <div class="decor full bottom-center flower">
        <img src="svgs/FlorFinal.svg">
    </div>

    <!-- Contenido -->
    <div class="title-small">Bienvenidos a nuestro</div>
    <div class="title-big">Nuevo Hogar</div>

    <div class="subtitle">
        "Nuestro departamento se estrena mejor con risas y drinks... ¡te esperamos!"
    </div>

    <div class="date-container">
        <div>DOMINGO</div>
        <div class="date-center">
            <div>ABRIL</div>
            <div class="day">5</div>
            <div>2026</div>
        </div>
        <div>A LAS 6:00 PM</div>
    </div>

    <div class="address">
        Calle Dr Gustavo Baz Prada No. 19<br>
        Col. Centro, San Francisco<br>
        Soyaniquilpan,<br>
        Edo de Méx.
    </div>

    <div class="qr">
        <a href="https://maps.app.goo.gl/2w4Up4HQFMjDv4YVA?g_st=aw" target="_blank">
            <img src="svgs/QR.svg">
    </div>

</div>
<script>
window.addEventListener("load", () => {
    const container = document.querySelector(".stars-container");

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    for (let i = 0; i < 200; i++) {
    const star = document.createElement("div");
    star.classList.add("star");

    star.style.left = centerX + "px";
    star.style.top = centerY + "px";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * window.innerWidth;

    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    star.style.setProperty("--x", `${x}px`);
    star.style.setProperty("--y", `${y}px`);

    star.style.animationDelay = `${Math.random() * 0.5}s`;

    container.appendChild(star);

    setTimeout(() => {
        star.remove();
    }, 1500);
    }
});
</script>

</body>
</html>
